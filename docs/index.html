<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internet Mirror — Turn 1-Star Reviews Into 5-Star Experiences</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ReviewPulse</h1>
   <p>Paste your customer reviews below — one per line — and get instant sentiment analysis + ready-to-send responses.</p>

  <textarea id="text-input" placeholder="Paste customer reviews here, one per line..."></textarea>
<button id="analyze-btn">Analyze Reviews</button>
  <p id="status-text"></p>

  <div id="canvas-container"></div>

  <div id="results-section">
  <h2>Review Breakdown</h2>
  <!-- NEW: satisfaction score + complaints panel -->
  <div id="score-panel">
    <div id="score-circle">
      <span id="score-number">--</span>
      <span id="score-label">Satisfaction Score</span>
    </div>
    <div id="complaints-panel">
      <p id="complaints-title">Top Complaints</p>
      <div id="complaints-list"></div>
    </div>
  </div>
  <p id="results-summary"></p>
  <div id="results-list"></div>
</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
